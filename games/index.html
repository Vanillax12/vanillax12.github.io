<!DOCTYPE html><html lang="en">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
        --background: #090a10;
        --text: #f1f3ff;
        --muted: #9da3ba;
        --purple: #9b6cff;
        --pink: #ff6fcf;
        --blue: #6cc9ff;
        --border: rgba(255, 255, 255, 0.08);
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;

        background:
            radial-gradient(circle at 15% 10%, rgba(155, 108, 255, 0.15), transparent 30%),
            radial-gradient(circle at 85% 80%, rgba(255, 111, 207, 0.10), transparent 30%),
            var(--background);

        color: var(--text);
        font-family: 'Inter', sans-serif;
    }

    .container {
        width: min(1100px, 92%);
        margin: auto;
    }

    header {
        padding: 70px 0 35px;
    }

    .back {
        display: inline-block;
        margin-bottom: 30px;

        color: var(--muted);
        text-decoration: none;

        transition: color 0.2s ease;
    }

    .back:hover {
        color: var(--text);
    }

    h1 {
        margin: 0 0 15px;

        font-size: clamp(3rem, 8vw, 5rem);
        letter-spacing: -3px;

        background: linear-gradient(
            90deg,
            var(--purple),
            var(--pink),
            var(--blue)
        );

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .subtitle {
        color: var(--muted);
        font-size: 1.1rem;
    }

    .message {
        margin: 35px 0;
        padding: 35px;

        border: 1px solid var(--border);
        border-radius: 22px;

        background: rgba(17, 19, 29, 0.75);

        text-align: center;

        font-size: clamp(1.5rem, 5vw, 3rem);
        font-weight: 800;

        box-shadow:
            0 15px 45px rgba(0, 0, 0, 0.2),
            0 0 30px rgba(155, 108, 255, 0.05);
    }

    .gif-army {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(292px, 1fr));

        justify-items: center;
        gap: 25px;

        padding: 20px 0 70px;
    }

    .gif {
        width: 292px;
        height: 388px;

        border: 1px solid var(--border);
        border-radius: 18px;

        overflow: hidden;

        background: rgba(255, 255, 255, 0.03);

        box-shadow:
            0 10px 35px rgba(0, 0, 0, 0.3),
            0 0 20px rgba(155, 108, 255, 0.05);
    }

    .gif iframe {
        display: block;

        width: 292px;
        height: 388px;

        border: none;
    }

    .johnvertisement {
        margin: 30px 0 40px;
        padding: 8px;

        border-radius: 16px;

        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
    }

    footer {
        padding: 30px 0 45px;

        text-align: center;
        color: var(--muted);
    }

    @media (max-width: 650px) {
        header {
            padding-top: 45px;
        }

        h1 {
            letter-spacing: -2px;
        }

        .gif-army {
            grid-template-columns: 1fr;
        }
    }
</style>
